<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAIT LAB | Latest Updates</title>
    <link rel="icon" href="lab_logo.png" type="image/png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --primary: #5c6bc0;
            --accent: #ff8a65;
            --secondary: #66bb6a;
            --text-main: #f5f5f5;
            --text-sub: #a0a0a0;
            --border: #262626;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.75;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            margin-bottom: 4rem;
            text-align: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        .posts-container {
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        .post-card {
            border-bottom: 1px solid var(--border);
            padding-bottom: 4rem;
        }

        .post-date {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            display: block;
        }

        .post-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.3;
        }

        .post-content {
            color: var(--text-sub);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            white-space: pre-wrap;
        }

        .post-media {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            max-height: 500px;
            object-fit: cover;
        }

        video.post-media {
            background: #000;
            object-fit: contain;
        }

        footer {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-sub);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">
                <i data-lucide="arrow-left" style="width: 16px;"></i>
                Back to Lab
            </a>
            <h1>Latest Updates</h1>
            <p style="color: var(--text-sub);">News, research insights, and technological milestones from WAIT LABS.</p>
        </header>

        <div id="posts-container" class="posts-container">
            <!-- Posts loaded from API -->
            <p>Loading updates...</p>
        </div>

        <footer>
            © 2026 WAIT LAB // EMERGING AI RESEARCH
        </footer>
    </div>

    <script>
        lucide.createIcons();

        function loadPosts() {
            fetch('/api/posts')
                .then(res => res.json())
                .then(posts => {
                    console.log('Fetched posts:', posts);
                    const container = document.getElementById('posts-container');
                    if (!posts || posts.length === 0) {
                        container.innerHTML = '<p style="text-align: center; color: var(--text-sub);">No updates published yet. Check back soon!</p>';
                        return;
                    }

                    container.innerHTML = posts.map(post => {
                        let dateStr = 'Recent Update';
                        try {
                            if (post.date) {
                                dateStr = new Date(post.date).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
                            }
                        } catch (e) { console.error('Date error:', e); }

                        return `
                            <article class="post-card">
                                <span class="post-date">${dateStr}</span>
                                <h2 class="post-title">${post.title}</h2>
                                
                                ${post.media ? (post.mediaType === 'video' 
                                    ? `<video src="${post.media}" class="post-media" controls></video>` 
                                    : `<img src="${post.media}" class="post-media" alt="${post.title}">`) : ''}
                                
                                <div class="post-content">${post.content}</div>
                            </article>
                        `;
                    }).join('');
                })
                .catch(err => {
                    console.error('Failed to load posts:', err);
                    document.getElementById('posts-container').innerHTML = '<p style="color: #ef5350;">Failed to load updates. Please try again later.</p>';
                });
        }

        loadPosts();
    </script>
</body>
</html>
