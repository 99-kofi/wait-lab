<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAIT LAB | Admin Dashboard</title>
    <link rel="icon" href="lab_logo.png" type="image/png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --primary: #5c6bc0;
            --accent: #ff8a65;
            --secondary: #66bb6a;
            --text-main: #f5f5f5;
            --text-sub: #a0a0a0;
            --border: #262626;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .stat-label {
            color: var(--text-sub);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .publish-section {
            background: var(--surface);
            padding: 2rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 3rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-sub);
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-main);
            font-family: inherit;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .posts-list {
            margin-top: 3rem;
        }

        .post-item {
            background: var(--surface);
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .post-info h3 {
            margin: 0 0 0.5rem 0;
        }

        .post-info p {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin: 0;
        }

        .post-media-preview {
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 1.5rem;
        }

        .btn-delete {
            background: #ef5350;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        /* Auth Overlay */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }

        .auth-card {
            background: var(--surface);
            padding: 3rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .auth-card h2 {
            margin-top: 0;
            margin-bottom: 2rem;
            color: var(--primary);
        }

        .auth-card input {
            margin-bottom: 1.5rem;
            padding: 1rem;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <!-- Auth Gateway -->
    <div id="auth-overlay">
        <div class="auth-card">
            <h2>Admin Authentication</h2>
            <form id="auth-form">
                <input type="password" id="auth-password" placeholder="Enter Password" required>
                <button type="submit" class="btn" style="width: 100%;">Access Secure Portal</button>
            </form>
        </div>
    </div>

    <div class="container" id="main-content" style="display: none;">
        <header>
            <h1>WAIT LAB | Admin</h1>
            <a href="index.html" style="color: var(--text-sub); text-decoration: none;">View Site</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Site Visits</div>
                <div class="stat-value" id="visit-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Posts</div>
                <div class="stat-value" id="post-count">0</div>
            </div>
        </div>

        <section class="publish-section">
            <h2>Publish New Post</h2>
            <form id="publish-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required placeholder="Enter post title...">
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" required placeholder="Write your post here..."></textarea>
                </div>
                <div class="form-group">
                    <label for="media">Media (Image or Video)</label>
                    <input type="file" id="media" accept="image/*,video/*">
                </div>
                <button type="submit" class="btn">Publish Post</button>
                <button type="button" class="btn btn-secondary" onclick="publishTestPost()" style="background: var(--surface); border: 1px solid var(--border); margin-left: 1rem;">Send Test Post (No Media)</button>
            </form>
        </section>

        <section class="posts-list">
            <h2>Manage Posts</h2>
            <div id="posts-container">
                <!-- Posts will be loaded here -->
            </div>
        </section>
    </div>
    <script>
        let currentPosts = [];
        let editingPostId = null;

        // --- AUTHENTICATION LOGIC ---
        const authOverlay = document.getElementById('auth-overlay');
        const mainContent = document.getElementById('main-content');
        
        function getAuthToken() {
            return localStorage.getItem('admin_password');
        }

        async function checkAuth() {
            const token = getAuthToken();
            if (token) {
                try {
                    const res = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        authOverlay.style.display = 'none';
                        mainContent.style.display = 'block';
                        loadDashboard();
                        return;
                    }
                } catch(e) {}
                localStorage.removeItem('admin_password');
            }
            authOverlay.style.display = 'flex';
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'Verifying...';
            
            const pwd = document.getElementById('auth-password').value;
            
            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${pwd}` }
                });
                
                if (res.ok) {
                    localStorage.setItem('admin_password', pwd);
                    authOverlay.style.display = 'none';
                    mainContent.style.display = 'block';
                    loadDashboard();
                } else {
                    alert('Incorrect password! Access denied.');
                }
            } catch(err) {
                alert('Verification encountered an error.');
            }
            btn.innerText = originalText;
        });

        // Global fetch helper tailored to intercept 401s
        async function fetchWithAuth(url, options = {}) {
            const token = getAuthToken();
            const headers = {
                ...options.headers,
                'Authorization': token ? `Bearer ${token}` : ''
            };
            
            const response = await fetch(url, { ...options, headers });
            
            if (response.status === 401) {
                localStorage.removeItem('admin_password');
                alert('Authentication failed. Password might be incorrect or expired.');
                window.location.reload();
                throw new Error('Unauthorized');
            }
            
            return response;
        }

        checkAuth(); // Initial check


        // --- DASHBOARD LOGIC ---
        // Load data on page load
        function loadDashboard() {
            // Fetch Stats
            fetch('/api/stats')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('visit-count').innerText = data.visits || 0;
                });

            // Fetch Posts
            fetch('/api/posts')
                .then(res => res.json())
                .then(posts => {
                    currentPosts = posts;
                    document.getElementById('post-count').innerText = posts.length;
                    const container = document.getElementById('posts-container');
                    container.innerHTML = posts.map(post => `
                        <div class="post-item">
                            <div style="display: flex; align-items: center;">
                                ${post.media ? (post.mediaType === 'video' 
                                    ? `<video src="${post.media}" class="post-media-preview"></video>` 
                                    : `<img src="${post.media}" class="post-media-preview">`) : ''}
                                <div class="post-info">
                                    <h3>${post.title}</h3>
                                    <p>${new Date(post.date).toLocaleString()}</p>
                                </div>
                            </div>
                            <div>
                                <button class="btn btn-secondary" style="background: var(--primary); padding: 0.5rem 1rem; font-size: 0.8rem; margin-right: 0.5rem" onclick="editPost(${post.id})">Edit</button>
                                <button class="btn btn-delete" onclick="deletePost(${post.id})">Delete</button>
                            </div>
                        </div>
                    `).join('');
                });
        }

        // Handle form submission
        document.getElementById('publish-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const mediaFile = document.getElementById('media').files[0];

            let mediaBase64 = null;
            let mediaType = null;

            if (mediaFile) {
                // If it exceeds Vercel limits (~4MB), it might fail, but base64 is necessary for serverless data storage without external blobs.
                mediaBase64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(mediaFile);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
                mediaType = mediaFile.type.startsWith('video') ? 'video' : 'image';
            }
            const payload = {
                title,
                content,
                media: mediaBase64,
                mediaType
            };

            if (editingPostId) {
                payload.id = editingPostId;
            }

            const method = editingPostId ? 'PUT' : 'POST';

            fetchWithAuth('/api/posts', {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(err => { throw new Error(err.error || 'Unknown error') });
                }
                return res.json();
            })
            .then(() => {
                document.getElementById('publish-form').reset();
                if (editingPostId) {
                    editingPostId = null;
                    document.querySelector('#publish-form button[type="submit"]').innerText = 'Publish Post';
                }
                loadDashboard();
                alert(method === 'PUT' ? 'Post updated successfully!' : 'Post published successfully!');
            })
            .catch(err => {
                console.error('Error saving post:', err);
                alert('Failed to save post: ' + err.message);
            });
        });

        // Edit post
        function editPost(id) {
            const post = currentPosts.find(p => p.id === id);
            if (post) {
                editingPostId = post.id;
                document.getElementById('title').value = post.title;
                document.getElementById('content').value = post.content;
                document.querySelector('#publish-form button[type="submit"]').innerText = 'Update Post';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Delete post
        function deletePost(id) {
            if (confirm('Are you sure you want to delete this post?')) {
                fetchWithAuth('/api/posts?id=' + id, { method: 'DELETE' })
                    .then(() => loadDashboard())
                    .catch(e => alert('Failed to delete post: ' + e));
            }
        }

        // Publish test post
        function publishTestPost() {
            const payload = {
                title: 'System Test Post',
                content: 'This is a test post sent by the system to verify the updates page rendering.'
            };
            
            fetchWithAuth('/api/posts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.ok ? res.json() : Promise.reject('Failed'))
            .then(() => {
                alert('Test post published!');
                loadDashboard();
            })
            .catch(err => alert('Test post failed: ' + err));
        }

        loadDashboard();
    </script>
</body>
</html>
