<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAIT LAB | Admin Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --primary: #5c6bc0;
            --accent: #ff8a65;
            --secondary: #66bb6a;
            --text-main: #f5f5f5;
            --text-sub: #a0a0a0;
            --border: #262626;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0.5rem 0;
        }

        .stat-label {
            color: var(--text-sub);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .publish-section {
            background: var(--surface);
            padding: 2rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 3rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-sub);
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-main);
            font-family: inherit;
        }

        textarea {
            height: 150px;
            resize: vertical;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .posts-list {
            margin-top: 3rem;
        }

        .post-item {
            background: var(--surface);
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .post-info h3 {
            margin: 0 0 0.5rem 0;
        }

        .post-info p {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin: 0;
        }

        .post-media-preview {
            max-width: 100px;
            max-height: 100px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 1.5rem;
        }

        .btn-delete {
            background: #ef5350;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>WAIT LAB | Admin</h1>
            <a href="index.html" style="color: var(--text-sub); text-decoration: none;">View Site</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Site Visits</div>
                <div class="stat-value" id="visit-count">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Posts</div>
                <div class="stat-value" id="post-count">0</div>
            </div>
        </div>

        <section class="publish-section">
            <h2>Publish New Post</h2>
            <form id="publish-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required placeholder="Enter post title...">
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" required placeholder="Write your post here..."></textarea>
                </div>
                <div class="form-group">
                    <label for="media">Media (Image or Video)</label>
                    <input type="file" id="media" accept="image/*,video/*">
                </div>
                <button type="submit" class="btn">Publish Post</button>
                <button type="button" class="btn btn-secondary" onclick="publishTestPost()" style="background: var(--surface); border: 1px solid var(--border); margin-left: 1rem;">Send Test Post (No Media)</button>
            </form>
        </section>

        <section class="posts-list">
            <h2>Manage Posts</h2>
            <div id="posts-container">
                <!-- Posts will be loaded here -->
            </div>
        </section>
    </div>

    <script>
        // Load data on page load
        function loadDashboard() {
            // Fetch Stats
            fetch('/api/stats')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('visit-count').innerText = data.visits;
                });

            // Fetch Posts
            fetch('/api/posts')
                .then(res => res.json())
                .then(posts => {
                    document.getElementById('post-count').innerText = posts.length;
                    const container = document.getElementById('posts-container');
                    container.innerHTML = posts.map(post => `
                        <div class="post-item">
                            <div style="display: flex; align-items: center;">
                                ${post.media ? (post.mediaType === 'video' 
                                    ? `<video src="${post.media}" class="post-media-preview"></video>` 
                                    : `<img src="${post.media}" class="post-media-preview">`) : ''}
                                <div class="post-info">
                                    <h3>${post.title}</h3>
                                    <p>${new Date(post.date).toLocaleString()}</p>
                                </div>
                            </div>
                            <button class="btn btn-delete" onclick="deletePost(${post.id})">Delete</button>
                        </div>
                    `).join('');
                });
        }

        // Handle form submission
        document.getElementById('publish-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const media = document.getElementById('media').files[0];

            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);
            if (media) formData.append('media', media);

            fetch('/api/posts', {
                method: 'POST',
                body: formData
            })
            .then(res => {
                if (!res.ok) {
                    return res.json().then(err => { throw new Error(err.error || 'Unknown error') });
                }
                return res.json();
            })
            .then(() => {
                document.getElementById('publish-form').reset();
                loadDashboard();
                alert('Post published successfully!');
            })
            .catch(err => {
                console.error('Error publishing post:', err);
                alert('Failed to publish post: ' + err.message);
            });
        });

        // Delete post
        function deletePost(id) {
            if (confirm('Are you sure you want to delete this post?')) {
                fetch(`/api/posts/${id}`, { method: 'DELETE' })
                    .then(() => loadDashboard());
            }
        }

        // Publish test post
        function publishTestPost() {
            const formData = new FormData();
            formData.append('title', 'System Test Post');
            formData.append('content', 'This is a test post sent by the system to verify the updates page rendering.');
            
            fetch('/api/posts', {
                method: 'POST',
                body: formData
            })
            .then(res => res.ok ? res.json() : Promise.reject('Failed'))
            .then(() => {
                alert('Test post published!');
                loadDashboard();
            })
            .catch(err => alert('Test post failed: ' + err));
        }

        loadDashboard();
    </script>
</body>
</html>
